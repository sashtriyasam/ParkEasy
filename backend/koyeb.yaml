name: parkeasy-backend
services:
  - name: api
    type: web
    git:
      branch: main
      build_command: "npm run build"
      run_command: "npm start"
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
    ports:
      - port: 5000
        protocol: http
    health_checks:
      - path: /health
        port: 5000
